# =============================================================================
#  AI Agents Sandbox — Podman security defaults for krun (microVM) mode
#  Used via: CONTAINERS_CONF=./containers-krun.conf podman run ...
#
#  Differences from containers.conf:
#   - netns: krun uses Transparent Socket Impersonation (TSI) — slirp4netns
#            is not applicable here; krun routes traffic through the host stack.
#   - userns: the VM boundary replaces the keep-id user-namespace mapping.
# =============================================================================

[containers]

# Drop all Linux capabilities within the microVM kernel
default_capabilities = []

# Prevent privilege escalation within the microVM
no_new_privileges = true

# Fixed hostname for a clean prompt
hostname = "ai-sandbox"

# Limit the number of processes inside the microVM to prevent fork bombs
pids_limit = 100

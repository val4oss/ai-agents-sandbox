# =============================================================================
#  AI Agents Sandbox — Podman security defaults
#  Used via: CONTAINERS_CONF=./containers.conf podman run ...
#  Keeps the podman run command minimal while enforcing all security settings.
# =============================================================================

[containers]

# Drop all Linux capabilities (--cap-drop=ALL)
default_capabilities = []

# Prevent privilege escalation (--security-opt=no-new-privileges)
no_new_privileges = true

# User-space network stack, isolated from the host (--network=slirp4netns)
netns = "slirp4netns"

# Map container user to host UID, never real root (--userns=keep-id)
userns = "keep-id"

# Fixed hostname for a clean prompt (--hostname=ai-sandbox)
hostname = "ai-sandbox"
